name: Build Eleventy and Deploy to GitHub Pages

on:
  push:
    branches:
      - main             # ถ้า default branch คุณเป็น main
  workflow_dispatch:     # เผื่ออยากกดรันเอง

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci          # ตรงกับ devDependencies ปัจจุบัน [web:41][web:61]

      - name: Build Eleventy
        run: npm run build   # ใช้สคริปต์ build ใน package.json ของคุณ [web:41][web:61]

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./_site      # Eleventy output ตามค่าเริ่มต้น [web:41][web:61]

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4   # GitHub Pages Action รุ่นใหม่ [web:53]
